<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетевой граф 2</title>
    <style>
        body {
            margin: 0;
            font-family: "Times New Roman", serif;
            background: #0b0b0b;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px 50px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 42px;
        }

        h2 {
            margin-top: 0;
            font-weight: normal;
            color: #cfcfcf;
            font-size: 24px;
        }

        .nav {
            margin: 25px 0;
        }

        .nav a {
            display: inline-block;
            margin: 0 10px;
            padding: 12px 22px;
            color: white;
            text-decoration: none;
            border: 1px solid #4da3ff;
            border-radius: 10px;
            background: #111827;
            transition: 0.2s ease;
        }

        .nav a:hover {
            background: #1d4ed8;
        }

        .card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.35);
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            background: #dcdcdc;
        }

        .caption {
            margin-top: 18px;
            font-size: 20px;
            color: #d6d6d6;
        }

        .footer {
            margin-top: 25px;
            font-size: 16px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Сетевой граф 2</h1>
        <h2>Драматическое произведение «Гамлет»</h2>

        <div class="nav">
            <a href="index.html">Перейти к графу 1</a>
        </div>

        <div class="card">
            <img src="graf2.png" alt="Сетевой граф 2">
            <div class="caption">
                Визуализация взаимодействий персонажей произведения «Гамлет».
            </div>
        </div>

        <div class="footer">
            Лабораторная работа №9. Сетевой анализ драматических произведений.
        </div>
    </div>
</body>
</html>
